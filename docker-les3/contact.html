<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f3f4f6; color: #333; }

    .container { max-width: 1100px; margin: auto; padding: 20px; }

    header { background: #fff; border-bottom: 1px solid #ddd; }
    header .nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
    header a { margin-left: 20px; text-decoration: none; color: #555; }
    header a.active { color: #2563eb; font-weight: bold; }

    .hero { background: #fff; text-align: center; padding: 50px 20px; }
    .hero h2 { font-size: 28px; margin-bottom: 10px; }
    .hero p { color: #666; }

    .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-top: 30px; }

    .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }

    .sidebar ul { list-style: none; }
    .sidebar li { margin-bottom: 10px; }

    form input, form textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    form button {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
    }

    .locations { text-align: center; padding: 40px 0; }
    .locations .items { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
    .locations .item {
      width: 80px;
      height: 140px;
      background: #ddd;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    footer { background: #111; color: #ccc; padding: 30px 20px; margin-top: 40px; }
    footer .footer-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }

  </style>
</head>
<body>

<header>
  <div class="nav container">
    <h1>Bedrijfsnaam</h1>
    <div>
      <a href="#">Home</a>
      <a href="#">Over</a>
      <a href="#" class="active">Contact</a>
    </div>
  </div>
</header>

<section class="hero">
  <h2>Neem contact met ons op</h2>
  <p>We helpen je graag.</p>
</section>

<div class="container grid">

  <div class="card sidebar">
    <h3>Contactopties</h3>
    <ul>
      <li>Telefoon</li>
      <li>Email</li>
      <li>Adres</li>
      <li>Live chat</li>
    </ul>
  </div>

  <div class="card">
    <form>
      <input type="text" placeholder="Naam">
      <input type="email" placeholder="Email">
      <input type="text" placeholder="Onderwerp">
      <textarea rows="5" placeholder="Bericht"></textarea>
      <button>Verstuur</button>
    </form>
  </div>

</div>

<section class="locations">
  <h3>Onze locaties</h3>
  <div class="items">
    <div class="item">📷</div>
    <div class="item">📷</div>
    <div class="item">📷</div>
    <div class="item">📷</div>
  </div>
</section>

<footer>
  <div class="container footer-grid">
    <div>© 2026 Bedrijf</div>
    <div>Links</div>
    <div>Contact</div>
  </div>
</footer>

</body>
</html>
